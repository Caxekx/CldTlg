name: Deploy bot to VPS

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          BOT_DIR: ${{ secrets.BOT_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 "$VPS_USER@$VPS_HOST" "cd '$BOT_DIR' && git pull --ff-only && ./scripts/install.sh && sudo systemctl restart claude-telegram-bot && sudo systemctl status claude-telegram-bot --no-pager"
